; Limity uploadu poligonu MP — ZAPAS nad limitem aplikacji (8 MB/plik):
; aplikacja waliduje 8 MB i pokazuje czytelny blad, PHP nie ucina requestu wczesniej.
; (goly PHP ma 2M/8M — bez tego upload wywala sie na demo; decyzja FREEZE pkt 5)
upload_max_filesize = 10M
