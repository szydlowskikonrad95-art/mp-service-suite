name: quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # matryca: skladnia + testy jednostkowe na KAZDEJ wersji PHP (podloga 8.1 ze spec)
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php }}'
          tools: 'composer:v2'
      - run: composer install --prefer-dist --no-progress
      - name: Lint skladni
        run: find mp-service-intake mp-warranty-registry mp-workflow-automator lib -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
      - name: PHPUnit
        run: vendor/bin/phpunit

  # lint/static raz na 8.3 (zgodnosc wersji lapie PHPCompatibilityWP w phpcs)
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: 'composer:v2'
      - run: composer install --prefer-dist --no-progress
      - name: Build kopii Common (PHPStan discovery symboli)
        run: bash build/build.sh
      - name: PHPCS (czysty WPCS + PHPCompatibilityWP)
        run: vendor/bin/phpcs
      - name: PHPStan (lvl 6 + wordpress-stubs)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G
      - name: Linter cudzych tabel (tokenowy)
        run: php build/lint-cudze-tabele.php

  # artefakty: build ZIP-ow (stempel Common + BUILD-INFO + smoke z kopii)
  build-artefakty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Build (kopie Common, BUILD-INFO, ZIP, smoke)
        run: bash build/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: mp-plugins-zip
          path: build/dist/*.zip

  # oficjalny Plugin Check — na ZBUDOWANYM artefakcie (runda W), per plugin
  plugin-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [mp-service-intake, mp-warranty-registry, mp-workflow-automator]
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Build artefaktu
        run: bash build/build.sh
      - uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './build/dist/${{ matrix.plugin }}'
          # outdated_tested_upto_header: wymog KATALOGU wp.org ("Tested up to" = najnowszy WP);
          #   nasz target ze spec = WP 6.9.4; po smoke-tescie artefaktow na 7.0.2 (przed oddaniem)
          #   podbijamy "Tested up to: 7.0" i zdejmujemy ten ignore.
          # load_plugin_textdomainFound: auto-tlumaczenia WP dzialaja TYLKO dla pluginow z katalogu
          #   wp.org; nasze .mo leza lokalnie w languages/ => wywolanie jest konieczne.
          ignore-codes: 'outdated_tested_upto_header,PluginCheck.CodeAnalysis.DiscouragedFunctions.load_plugin_textdomainFound'

  # skan sekretow (maszyna; lokalny pre-commit to tylko pierwsza linia)
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # E2E DoD klocka B na ZYWYM WP (sygnal #1): import 10k, kill-polowa-wznowienie,
  # partia CSV->check, negatywne uprawnienia, snapshot-uninstall.
  e2e-import:
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:11.8
        env:
          MARIADB_DATABASE: wordpress
          MARIADB_USER: wp
          MARIADB_PASSWORD: wp
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mysqli, iconv, intl
          tools: wp-cli
      - name: Build pluginow (kopie Common)
        run: bash build/build.sh
      - name: Instalacja WP 6.9.4 (pin ze spec)
        run: |
          mkdir -p /tmp/wp && cd /tmp/wp
          wp core download --version=6.9.4
          wp config create --dbname=wordpress --dbuser=wp --dbpass=wp --dbhost=127.0.0.1
          # URL == adres wbudowanego serwera (wp server) — front E2E bez 301 na canonical.
          wp core install --url=http://127.0.0.1:8080 --title=DoD --admin_user=admin \
            --admin_password=admin --admin_email=dod@example.com --skip-email
          cp -r "$GITHUB_WORKSPACE"/mp-service-intake "$GITHUB_WORKSPACE"/mp-warranty-registry \
            "$GITHUB_WORKSPACE"/mp-workflow-automator /tmp/wp/wp-content/plugins/
          # Przechwyt wp_mail (token magic-linka dla testu C3) — dev-only mu-plugin.
          mkdir -p /tmp/wp/wp-content/mu-plugins
          cp "$GITHUB_WORKSPACE"/docker/mu-plugins/mp-test-mail-capture.php /tmp/wp/wp-content/mu-plugins/
          wp plugin activate mp-service-intake mp-warranty-registry mp-workflow-automator
      - name: Testy C1 (rdzeń sprawy — SRV współbieżny + narodziny + snapshot z partią)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c1-rdzen.sh
      - name: Testy C2 (formularz dynamiczny + walidacje przed insertem)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c2-formularz.sh
      - name: Testy C3 (front — formularz, honeypot, magic-link, potwierdzenie)
        run: |
          cd /tmp/wp
          wp server --host=127.0.0.1 --port=8080 --docroot=/tmp/wp >/tmp/wp-server.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8080/ -o /dev/null && break; sleep 1; done
          MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c3-front.sh
      - name: Testy C4 (załączniki twardo — finfo, EXIF-strip, deny-ALL, IDOR, retencja)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c4-zalaczniki.sh
      - name: Testy C5 (RODO — zgody, wiadomości, eraser/exporter, anonimizacja)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c5-rodo.sh
      - name: Testy C6a (konto mp_client + passwordless login + panel IDOR)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c6a-konto-panel.sh
      - name: Testy C6b (wiadomości na panelu — historia + wysyłka + IDOR + zamknięta)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c6b-wiadomosci.sh
      - name: Testy C6b-2a (edycja danych kontaktowych — art. 16)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c6b2-dane-kontaktowe.sh
      - name: Testy C6b-2b (wycofanie zgody + eraser + FLAGA #6 RODO)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c6b2b-wycofanie-zgody.sh
      - name: Testy C6c (ochrona zgłoszeń — rate-limit + dedup P1.6)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c6c-ochrona-zgloszen.sh
      - name: Testy formularz dynamiczny (#15 — render unii pól + config JS + submit każdego rodzaju)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c-form-dynamic.sh
      - name: Testy C-kategoria-formularz (P1.2 — pola formularza wg kategorii + zero regresji rodzaju)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c-kategoria-formularz.sh
      - name: Testy szlif Intake (#16 — pasek admina wg roli + CSS frontu + CTA do panelu)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c16-szlif.sh
      - name: Testy C11 (wyjatek gwarancyjny B => EXCEPTION_APPLIED/REVOKED na osi C, NO-PII, global=no-op)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c11-exception-event.sh
      - name: Testy C7a (serial-reuse P2.3 — flaga possible_duplicate)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c7a-serial-reuse.sh
      - name: Testy C7b (admin unverified — capability + throttle + resend + negatywna macierz ról)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c7b-admin-unverified.sh
      - name: DoD §3 — security-sweep (macierz ról negatywna, wszystkie endpointy admina => 403)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/c-dod-security-matrix.sh
      - name: DoD §7 — a11y/WCAG (labelki + role=alert + aria-describedby na formularzach)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/a11y-forms.sh
      - name: Testy B-kategoria (kartka P1.2/P3.1 — kolumna category + slownik + parser + hak mp_product_category)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/b-kategoria.sh
      - name: Testy D1 (schemat Automatora — 4 tabele + append-only + idempotencja migracji)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d1-schema.sh
      - name: Testy C-hooki dla D (mp_case_get_context + mp_case_assign + CASE_ASSIGNED)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-hooki-c.sh
      - name: Testy P3.1 (silnik reguł + auto-przydział round-robin + ASSIGNMENT_UNMATCHED)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p31-przydzial.sh
      - name: Testy P3.1 wg KATEGORII (kartka — produkt->sprawa->get_context.kategoria->regula->przydzial)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p31-kategoria.sh
      - name: Testy P3.2 (mp_case_change_status — STATE_MACHINE + optimistic-lock + reopen)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p32-status.sh
      - name: Testy P3.2 D-side (statusy własne — filtr mp_registered_statuses + guard długości + round-trip)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p32b-statusy-d.sh
      - name: Testy P3.2 guard pętli (reguły A↔B → RULE_LOOP_BLOCKED, mutacja depth>=1 zablokowana, zero lawiny)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p32c-guard-petli.sh
      - name: Testy P3.3 maile (notify klient — render markerów, sanityzacja odbiorcy, NO-PII, MAIL_SKIPPED, mail z depth1)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p33-maile.sh
      - name: Testy P3.3 notyfikacja przydziału (hook mp_case_assigned — każdy przydział→mail agenta, bulletproof, NO-PII)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p33b-assign-notify.sh
      - name: Testy P3.3 reguły wiadomości (message_added — klient→agent, staff→klient, system=nic, guard from===to)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p33c-message.sh
      - name: Testy P3.3 dedup-okno (identyczny mail w oknie → MAIL_DEDUPED; różna treść przechodzi; okna per typ)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p33d-dedup.sh
      - name: Testy P3.4 SLA-1 księga (wiersz na created + reprovision + terminal→NULL + warning 25% + notify send-then-claim + SLA_* na osi C)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p34a-sla-ksiega.sh
      - name: Testy P3.4 SLA-2/SLA-3 sweep (cron 5-min + GET_LOCK + flaga #8 retroaktywna=1 powiadomienie + normalna ścieżka reminder→eskalacja + idempotencja markerów)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p34b-sla-sweep.sh
      - name: Testy P3.4 SLA-3 (resync po reaktywacji + digest bez lawiny >progu=1 mail + tryb zaległości idempotentny + poniżej progu per-sprawa)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p34c-sla3-digest-resync.sh
      - name: Testy PR-A mp_cases_query (paginacja+cap500 · minimalizacja PII · pola terminalne · filtry · scoping ról admin/agent/subscriber/anon)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c-cases-query.sh
      - name: Testy hook mp_all_statuses (kontrakt C->D — pełna lista rdzeń 7 + własne; terminalność wg flagi; rdzeń nieusuwalny)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c-all-statuses.sh
      - name: Testy P3.5 C-hook mp_case_checklist_authorize (ownership agent=tylko swoje/koordynator=dowolna · event CHECKLIST_ITEM_TOGGLED · FORBIDDEN/NOT_CASE_OWNER/CASE_NOT_FOUND/INVALID_STEP)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/c-checklist-authorize.sh
      - name: Testy P3.4 SLA-4 Przelicz SLA (admin_post+nonce+capability system-admin; nieretroaktywnosc — markery nietkniete, terminalne pominiete, nowo-przeterminowana=1 powiadomienie, audyt SLA_RECALCULATED)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p34d-przelicz.sh
      - name: Testy seed reguł domyślnych (aktywacja sieje raz; skasowana nie wraca; uninstall→świeży siew)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-seed-regul.sh
      - name: Testy P3.6 eksport CSV + zestawienie (handler admin-post · BOM · anti-injection =SUM · audyt EXPORT_GENERATED · bramka role/nonce)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p36-eksport.sh
      - name: Testy P3.5 checklisty per typ + szablony (toggle przez hook C · ownership · event · stan case_checklists · konfig admin · whitelist markerów · bramka)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-p35-checklisty.sh
      - name: Testy panel admina D (menu · widoczność per rola · przyciski per-cap Przelicz-SLA/Eksport · listy reguł/statusów/rejestr · slot P3.5 · 403 bez cap)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-panel-admina.sh
      - name: DoD D (uninstall zero-śladu + kanarki · degraded C/B OFF · macierz negatywna mp_agent/anon · widoczność menu panelu per rola)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-dod.sh
      - name: BLOK-S E2E (pełny przebieg 8 kroków kartki — B+C+D, SKIP D-pending)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/blok-s-e2e.sh
      - name: BLOK-S tabletop (S1-S10 niezmienniki, cross-plugin B↔C, SKIP D-pending)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/blok-s-tabletop.sh
      - name: BLOK-S bug-hunt (12 person — XSS/SQLi/IDOR/RODO/NO-PII na formularzu+panelu)
        run: cd /tmp/wp && MP_BASE=http://127.0.0.1:8080 bash "$GITHUB_WORKSPACE"/testy/e2e/blok-s-bughunt.sh
      - name: BLOK-S a11y/WCAG sweep (guard img-alt + nazwy przycisków + dup-id na wszystkich powierzchniach)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/blok-s-a11y.sh
      - name: Testy DoD (import 10k + kill/wznowienie + uninstall)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/import-dod.sh

  # DoD C sekcja 4 — brudny WP: niestandardowy prefiks + WP_DEBUG + object-cache + degraded-order
  dirty-env:
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:11.8
        env:
          MARIADB_DATABASE: wordpress
          MARIADB_USER: wp
          MARIADB_PASSWORD: wp
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mysqli, iconv, intl
          tools: wp-cli
      - name: Build pluginow (kopie Common)
        run: bash build/build.sh
      - name: Instalacja WP — NIESTANDARDOWY prefiks + WP_DEBUG + object-cache
        run: |
          mkdir -p /tmp/wp && cd /tmp/wp
          wp core download --version=6.9.4
          wp config create --dbname=wordpress --dbuser=wp --dbpass=wp --dbhost=127.0.0.1 --dbprefix=cms_x9_
          wp config set WP_DEBUG true --raw --type=constant
          wp config set WP_DEBUG_LOG true --raw --type=constant
          wp config set WP_DEBUG_DISPLAY false --raw --type=constant
          wp core install --url=http://127.0.0.1:8080 --title=Dirty --admin_user=admin \
            --admin_password=admin --admin_email=dirty@example.com --skip-email
          cp -r "$GITHUB_WORKSPACE"/mp-service-intake "$GITHUB_WORKSPACE"/mp-warranty-registry \
            "$GITHUB_WORKSPACE"/mp-workflow-automator /tmp/wp/wp-content/plugins/
          # persistent object-cache ON (drop-in testowy)
          cp "$GITHUB_WORKSPACE"/testy/fixtures/object-cache.php /tmp/wp/wp-content/object-cache.php
          wp plugin activate mp-service-intake mp-warranty-registry mp-workflow-automator
      - name: Dirty-env test (prefiks + WP_DEBUG zero-notice + object-cache + degraded)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/dirty-env.sh
      - name: DoD D na dirty-env (uninstall zero-śladu + degraded pod cms_x9_ + object-cache + WP_DEBUG zero-notice)
        run: cd /tmp/wp && bash "$GITHUB_WORKSPACE"/testy/e2e/d-dod.sh

  # DoD C sekcja 5 — MIGRACJA v0.2.0 -> v0.3.0 z realnymi danymi (upgrade bez reaktywacji)
  migration:
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:11.8
        env:
          MARIADB_DATABASE: wordpress
          MARIADB_USER: wp
          MARIADB_PASSWORD: wp
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mysqli, iconv, intl
          tools: wp-cli
      - name: Build v0.3.0 (glowny working tree — kopie Common)
        run: bash build/build.sh
      - name: Przygotuj v0.2.0 (worktree z tagu + build kopii Common)
        run: |
          git worktree add /tmp/v020 v0.2.0
          cd /tmp/v020 && bash build/build.sh
      - name: Instalacja WP 6.9.4
        run: |
          mkdir -p /tmp/wp && cd /tmp/wp
          wp core download --version=6.9.4
          wp config create --dbname=wordpress --dbuser=wp --dbpass=wp --dbhost=127.0.0.1
          wp core install --url=http://127.0.0.1:8080 --title=Mig --admin_user=admin \
            --admin_password=admin --admin_email=mig@example.com --skip-email
      - name: Test migracji v0.2.0 -> v0.3.0 (dane+schemat+cron+role+opcje)
        run: cd /tmp/wp && V020_SRC=/tmp/v020 V030_SRC="$GITHUB_WORKSPACE" bash "$GITHUB_WORKSPACE"/testy/e2e/migration.sh

  # DoD C sekcja 6 — RELEASE-SMOKE: testuj ARTEFAKT (ZIP), nie katalog dev
  release-smoke:
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:11.8
        env:
          MARIADB_DATABASE: wordpress
          MARIADB_USER: wp
          MARIADB_PASSWORD: wp
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mysqli, iconv, intl
          tools: wp-cli
      - name: Build ZIP-y (artefakt z build.sh)
        run: bash build/build.sh
      - name: Instalacja WP 6.9.4 + WP_DEBUG
        run: |
          mkdir -p /tmp/wp && cd /tmp/wp
          wp core download --version=6.9.4
          wp config create --dbname=wordpress --dbuser=wp --dbpass=wp --dbhost=127.0.0.1
          wp config set WP_DEBUG true --raw --type=constant
          wp config set WP_DEBUG_LOG true --raw --type=constant
          wp config set WP_DEBUG_DISPLAY false --raw --type=constant
          wp core install --url=http://127.0.0.1:8080 --title=Rel --admin_user=admin \
            --admin_password=admin --admin_email=rel@example.com --skip-email
      - name: Release-smoke na ZIP (install z artefaktu + WP_DEBUG + uninstall grep-zero)
        run: cd /tmp/wp && DIST_DIR="$GITHUB_WORKSPACE/build/dist" bash "$GITHUB_WORKSPACE"/testy/e2e/release-smoke.sh
